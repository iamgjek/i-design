    <script>
      (() => {
        try {
          const savedTheme = window.localStorage.getItem('i-design-theme');
          const supportedThemes = ['dark', 'light', 'industrial'];
          const theme = supportedThemes.includes(savedTheme) ? savedTheme : 'industrial';
          document.documentElement.dataset.theme = theme;
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.classList.toggle('light', theme === 'light');
          document.documentElement.classList.toggle('industrial', theme === 'industrial');
        } catch (error) {
          document.documentElement.dataset.theme = 'industrial';
          document.documentElement.classList.add('industrial');
        }
      })();
    </script>
